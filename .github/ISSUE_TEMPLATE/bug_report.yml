name: Bug report
description: Something isn't working in Claude Usage Meter
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: The popup shows ... but I expected ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Right-click the tray icon
        2. Click ...
        3. See error

  - type: input
    id: version
    attributes:
      label: App version
      description: Right-click tray icon → About…
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"

  - type: textarea
    id: logs
    attributes:
      label: Log file
      description: >
        Right-click the tray icon → **Open log folder** → drag today's
        `claude-meter-*.log` file into this box (logs contain no tokens or
        personal data).
    validations:
      required: false
